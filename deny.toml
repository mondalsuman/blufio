[graph]
targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste unmaintained — transitive via tikv-jemalloc-ctl, no alternative yet
    "RUSTSEC-2025-0065", # matrix-sdk-base panic — pinned to 0.11 per Phase 34 requirements, upgrade deferred
    "RUSTSEC-2025-0135", # matrix-sdk-base DoS — pinned to 0.11 per Phase 34 requirements, upgrade deferred
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — transitive via irc crate, no alternative yet
    "RUSTSEC-2025-0119", # number_prefix unmaintained — transitive via indicatif, no alternative yet
    "RUSTSEC-2025-0141", # bincode unmaintained — transitive via tokenizers/spm_precompiled, no alternative yet
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    { crate = "openssl", use-instead = "rustls" },
    # openssl-sys is allowed: needed by libsqlite3-sys for SQLCipher encryption at rest (not for TLS)
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "MIT-0",
    "MITNFA",
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "CC0-1.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]
