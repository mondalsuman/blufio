[package]
name = "blufio"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false
description = "An always-on personal AI agent"

[[bin]]
name = "blufio"
path = "src/main.rs"

[features]
default = ["telegram", "discord", "slack", "whatsapp", "signal", "irc", "matrix", "email", "imessage", "sms", "bridge", "anthropic", "openai", "ollama", "openrouter", "gemini", "sqlite", "onnx", "prometheus", "keypair", "gateway", "mcp-server", "mcp-client", "node"]
telegram = ["dep:blufio-telegram"]
discord = ["dep:blufio-discord"]
slack = ["dep:blufio-slack"]
whatsapp = ["dep:blufio-whatsapp", "blufio-gateway/whatsapp"]
signal = ["dep:blufio-signal"]
irc = ["dep:blufio-irc"]
matrix = ["dep:blufio-matrix"]
email = ["dep:blufio-email"]
imessage = ["dep:blufio-imessage"]
sms = ["dep:blufio-sms"]
bridge = ["dep:blufio-bridge"]
anthropic = ["dep:blufio-anthropic"]
openai = ["dep:blufio-openai"]
ollama = ["dep:blufio-ollama"]
openrouter = ["dep:blufio-openrouter"]
gemini = ["dep:blufio-gemini"]
sqlite = ["dep:blufio-storage"]
onnx = []
prometheus = ["dep:blufio-prometheus", "blufio-agent/prometheus"]
keypair = ["dep:blufio-auth-keypair"]
gateway = ["dep:blufio-gateway"]
mcp-server = ["dep:blufio-mcp-server"]
mcp-client = ["dep:blufio-mcp-client"]
node = ["dep:blufio-node"]
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-opentelemetry", "dep:opentelemetry-http", "blufio-mcp-client?/otel", "blufio-gateway?/otel"]
swagger-ui = ["dep:utoipa-swagger-ui", "blufio-gateway/swagger-ui"]
full = ["otel", "swagger-ui"]

[dependencies]
blufio-core = { path = "../blufio-core" }
blufio-config = { path = "../blufio-config" }
blufio-cron = { path = "../blufio-cron" }
blufio-vault = { path = "../blufio-vault" }
blufio-agent = { path = "../blufio-agent" }
blufio-context = { path = "../blufio-context" }
blufio-cost = { path = "../blufio-cost" }
blufio-router = { path = "../blufio-router" }
blufio-skill = { path = "../blufio-skill" }
blufio-plugin = { path = "../blufio-plugin" }
blufio-security = { path = "../blufio-security" }
blufio-gdpr = { path = "../blufio-gdpr" }
blufio-hooks = { path = "../blufio-hooks" }
blufio-injection = { path = "../blufio-injection" }
blufio-verify = { path = "../blufio-verify" }

# Optional adapter crates (controlled by feature flags).
blufio-storage = { path = "../blufio-storage", optional = true }
blufio-telegram = { path = "../blufio-telegram", optional = true }
blufio-discord = { path = "../blufio-discord", optional = true }
blufio-slack = { path = "../blufio-slack", optional = true }
blufio-whatsapp = { path = "../blufio-whatsapp", optional = true }
blufio-signal = { path = "../blufio-signal", optional = true }
blufio-irc = { path = "../blufio-irc", optional = true }
blufio-matrix = { path = "../blufio-matrix", optional = true }
blufio-email = { path = "../blufio-email", optional = true }
blufio-imessage = { path = "../blufio-imessage", optional = true }
blufio-sms = { path = "../blufio-sms", optional = true }
blufio-bridge = { path = "../blufio-bridge", optional = true }
blufio-audit = { path = "../blufio-audit" }
blufio-bus = { path = "../blufio-bus" }
blufio-resilience = { path = "../blufio-resilience" }
blufio-anthropic = { path = "../blufio-anthropic", optional = true }
blufio-openai = { path = "../blufio-openai", optional = true }
blufio-ollama = { path = "../blufio-ollama", optional = true }
blufio-openrouter = { path = "../blufio-openrouter", optional = true }
blufio-gemini = { path = "../blufio-gemini", optional = true }
blufio-memory = { path = "../blufio-memory" }
blufio-gateway = { path = "../blufio-gateway", optional = true }
blufio-prometheus = { path = "../blufio-prometheus", optional = true }
blufio-auth-keypair = { path = "../blufio-auth-keypair", optional = true }
blufio-mcp-server = { path = "../blufio-mcp-server", optional = true }
blufio-mcp-client = { path = "../blufio-mcp-client", optional = true }
blufio-node = { path = "../blufio-node", optional = true }

axum.workspace = true
tokio-rusqlite.workspace = true
clap.workspace = true
rpassword.workspace = true
secrecy.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-util.workspace = true
rustyline.workspace = true
colored.workspace = true
futures.workspace = true
uuid.workspace = true
chrono.workspace = true
serde_json = "1"
serde = { version = "1", features = ["derive"] }
dirs.workspace = true
toml = { workspace = true }
indicatif = { workspace = true }
reqwest = { workspace = true }
rusqlite = { workspace = true, features = ["backup"] }
croner.workspace = true
ring.workspace = true
hex.workspace = true
sha2.workspace = true
ed25519-dalek.workspace = true
self-replace = { workspace = true }
tempfile = { workspace = true }
semver.workspace = true
sysinfo.workspace = true
wasmtime.workspace = true
async-trait.workspace = true
arc-swap.workspace = true
notify.workspace = true
notify-debouncer-mini.workspace = true
metrics.workspace = true
flate2 = "1"
tar = "0.4"
utoipa.workspace = true
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }
opentelemetry-http = { workspace = true, optional = true }
utoipa-swagger-ui = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { workspace = true }
tikv-jemalloc-ctl = { workspace = true }

[dev-dependencies]
blufio-test-utils = { path = "../blufio-test-utils" }
blufio-auth-keypair = { path = "../blufio-auth-keypair" }
blufio-storage = { path = "../blufio-storage" }
blufio-gateway = { path = "../blufio-gateway" }
blufio-mcp-server = { path = "../blufio-mcp-server" }
blufio-mcp-client = { path = "../blufio-mcp-client" }
blufio-skill = { path = "../blufio-skill" }
serde_json = "1"
tempfile = "3"
toml.workspace = true
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
tower.workspace = true
http = "1"
axum.workspace = true
dashmap.workspace = true
rmcp.workspace = true
async-trait.workspace = true
semver.workspace = true
serial_test.workspace = true
insta.workspace = true
criterion.workspace = true

[[bench]]
name = "bench_context"
harness = false

[[bench]]
name = "bench_memory"
harness = false

[[bench]]
name = "bench_pii"
harness = false

[[bench]]
name = "bench_compaction"
harness = false

[[bench]]
name = "bench_vec0"
harness = false

[[bench]]
name = "bench_injection"
harness = false

[[bench]]
name = "bench_hybrid"
harness = false
