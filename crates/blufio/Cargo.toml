[package]
name = "blufio"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false
description = "An always-on personal AI agent"

[[bin]]
name = "blufio"
path = "src/main.rs"

[features]
default = ["telegram", "discord", "slack", "whatsapp", "signal", "irc", "matrix", "bridge", "anthropic", "sqlite", "onnx", "prometheus", "keypair", "gateway", "mcp-server", "mcp-client", "node"]
telegram = ["dep:blufio-telegram"]
discord = ["dep:blufio-discord"]
slack = ["dep:blufio-slack"]
whatsapp = ["dep:blufio-whatsapp", "blufio-gateway/whatsapp"]
signal = ["dep:blufio-signal"]
irc = ["dep:blufio-irc"]
matrix = ["dep:blufio-matrix"]
bridge = ["dep:blufio-bridge"]
anthropic = ["dep:blufio-anthropic"]
sqlite = ["dep:blufio-storage"]
onnx = []
prometheus = ["dep:blufio-prometheus", "blufio-agent/prometheus"]
keypair = ["dep:blufio-auth-keypair"]
gateway = ["dep:blufio-gateway"]
mcp-server = ["dep:blufio-mcp-server"]
mcp-client = ["dep:blufio-mcp-client"]
node = ["dep:blufio-node"]

[dependencies]
blufio-core = { path = "../blufio-core" }
blufio-config = { path = "../blufio-config" }
blufio-vault = { path = "../blufio-vault" }
blufio-agent = { path = "../blufio-agent" }
blufio-context = { path = "../blufio-context" }
blufio-cost = { path = "../blufio-cost" }
blufio-router = { path = "../blufio-router" }
blufio-skill = { path = "../blufio-skill" }
blufio-plugin = { path = "../blufio-plugin" }
blufio-security = { path = "../blufio-security" }
blufio-verify = { path = "../blufio-verify" }

# Optional adapter crates (controlled by feature flags).
blufio-storage = { path = "../blufio-storage", optional = true }
blufio-telegram = { path = "../blufio-telegram", optional = true }
blufio-discord = { path = "../blufio-discord", optional = true }
blufio-slack = { path = "../blufio-slack", optional = true }
blufio-whatsapp = { path = "../blufio-whatsapp", optional = true }
blufio-signal = { path = "../blufio-signal", optional = true }
blufio-irc = { path = "../blufio-irc", optional = true }
blufio-matrix = { path = "../blufio-matrix", optional = true }
blufio-bridge = { path = "../blufio-bridge", optional = true }
blufio-bus = { path = "../blufio-bus" }
blufio-anthropic = { path = "../blufio-anthropic", optional = true }
blufio-memory = { path = "../blufio-memory" }
blufio-gateway = { path = "../blufio-gateway", optional = true }
blufio-prometheus = { path = "../blufio-prometheus", optional = true }
blufio-auth-keypair = { path = "../blufio-auth-keypair", optional = true }
blufio-mcp-server = { path = "../blufio-mcp-server", optional = true }
blufio-mcp-client = { path = "../blufio-mcp-client", optional = true }
blufio-node = { path = "../blufio-node", optional = true }

tokio-rusqlite.workspace = true
clap.workspace = true
rpassword.workspace = true
secrecy.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-util.workspace = true
rustyline.workspace = true
colored.workspace = true
futures.workspace = true
uuid.workspace = true
chrono.workspace = true
serde_json = "1"
serde = { version = "1", features = ["derive"] }
dirs.workspace = true
toml = { workspace = true }
indicatif = { workspace = true }
reqwest = { workspace = true }
rusqlite = { workspace = true, features = ["backup"] }
ring.workspace = true
hex.workspace = true
ed25519-dalek.workspace = true
self-replace = { workspace = true }
tempfile = { workspace = true }
semver.workspace = true

[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { workspace = true }
tikv-jemalloc-ctl = { workspace = true }

[dev-dependencies]
blufio-test-utils = { path = "../blufio-test-utils" }
blufio-auth-keypair = { path = "../blufio-auth-keypair" }
blufio-storage = { path = "../blufio-storage" }
blufio-gateway = { path = "../blufio-gateway" }
blufio-mcp-server = { path = "../blufio-mcp-server" }
blufio-mcp-client = { path = "../blufio-mcp-client" }
blufio-skill = { path = "../blufio-skill" }
serde_json = "1"
tempfile = "3"
toml.workspace = true
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
tower.workspace = true
http = "1"
axum.workspace = true
dashmap.workspace = true
rmcp.workspace = true
async-trait.workspace = true
semver.workspace = true
serial_test.workspace = true
