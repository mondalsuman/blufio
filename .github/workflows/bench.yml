name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  benchmark:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench

      # Restore cached baseline from previous run.
      - name: Restore benchmark baseline
        id: bench-cache
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: bench-baseline-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('crates/blufio/benches/**') }}
          restore-keys: |
            bench-baseline-${{ hashFiles('Cargo.lock') }}-
            bench-baseline-

      # Cache ONNX model for hybrid pipeline benchmarks.
      - name: Cache ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/blufio/models
          key: onnx-model-all-MiniLM-L6-v2

      - name: Download ONNX model
        run: |
          MODEL_DIR="$HOME/.cache/blufio/models"
          mkdir -p "$MODEL_DIR"
          if [ ! -f "$MODEL_DIR/model.onnx" ]; then
            curl -L -o "$MODEL_DIR/model.onnx" \
              "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx"
          fi

      # Run benchmarks and save results.
      - name: Run benchmarks
        run: cargo bench -p blufio 2>&1 | tee bench-output.txt
        env:
          BLUFIO_MODEL_PATH: ~/.cache/blufio/models/model.onnx

      # Post benchmark results as PR comment via github-action-benchmark.
      - name: Store benchmark result
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Blufio Benchmarks
          tool: 'cargo'
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: '120%'
          fail-on-alert: ${{ github.event_name == 'push' }}
          auto-push: false

      # Check for >20% regressions in criterion output (main push only).
      # Criterion prints "regressed" for benchmarks that got slower.
      # We parse the output for regression percentages and fail if any exceed 20%.
      # Belt-and-suspenders: github-action-benchmark also alerts at 120%.
      - name: Check for regressions
        if: github.event_name == 'push'
        run: |
          echo "=== Checking for performance regressions ==="

          # Extract regression lines from criterion output.
          REGRESSIONS=$(grep -i "regressed" bench-output.txt || true)

          if [ -z "$REGRESSIONS" ]; then
            echo "No regressions detected."
            exit 0
          fi

          echo "Detected regression markers:"
          echo "$REGRESSIONS"

          # Parse percentage changes from criterion output.
          # Look for change lines with positive percentages > 20%.
          SEVERE=$(grep -oP 'change:.*?\+(\d+\.?\d*)%' bench-output.txt | \
            awk -F'+' '{print $2}' | awk -F'%' '{if ($1 > 20.0) print $1}' || true)

          if [ -n "$SEVERE" ]; then
            echo ""
            echo "FATAL: Benchmark regression >20% detected:"
            echo "$SEVERE"
            echo ""
            echo "Review the benchmark results above for details."
            exit 1
          fi

          echo "Regressions detected but all within 20% tolerance."

      # Upload HTML reports as artifact for manual investigation.
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion/
          retention-days: 30

  binary-size:
    name: Binary Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: binary-size

      - name: Install cargo-bloat
        run: cargo install cargo-bloat --locked

      - name: Build release binary
        run: cargo build --release -p blufio

      - name: Measure binary size
        id: size
        run: |
          SIZE=$(stat -c%s target/release/blufio 2>/dev/null || stat -f%z target/release/blufio)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB}MB ($SIZE bytes)"
          echo "binary_size=$SIZE" >> $GITHUB_OUTPUT
          echo "binary_size_mb=$SIZE_MB" >> $GITHUB_OUTPUT

          # Warn at 50MB
          if [ "$SIZE" -gt 52428800 ]; then
            echo "::warning::Binary size ${SIZE_MB}MB exceeds 50MB target"
          fi

          # Fail at 55MB
          if [ "$SIZE" -gt 57671680 ]; then
            echo "::error::Binary size ${SIZE_MB}MB exceeds 55MB hard limit"
            exit 1
          fi

          echo "Binary size ${SIZE_MB}MB is within limits"

      - name: Per-crate size breakdown
        run: cargo bloat --release -p blufio --crates -n 20

      - name: Build without sqlite-vec (size comparison)
        continue-on-error: true
        run: |
          # sqlite-vec is a hard dependency of blufio-memory (not feature-gated).
          # This step will fail until sqlite-vec is feature-gated.
          # When feature-gated, update this to use the correct --no-default-features + --features flags.
          echo "sqlite-vec is currently a hard dependency -- feature-flag comparison not yet available"
          echo "To enable: make sqlite-vec optional in crates/blufio-memory/Cargo.toml"

      - name: Report sqlite-vec size delta
        if: success()
        run: |
          echo "Full binary (with sqlite-vec): ${{ steps.size.outputs.binary_size_mb }}MB"
          echo "sqlite-vec is a hard dependency -- size delta requires feature-gating"

      - name: Measure debug binary size
        run: |
          cargo build -p blufio
          SIZE=$(stat -c%s target/debug/blufio 2>/dev/null || stat -f%z target/debug/blufio)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Debug binary size: ${SIZE_MB}MB"
