name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  benchmark:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench

      # Restore cached baseline from previous run.
      - name: Restore benchmark baseline
        id: bench-cache
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: bench-baseline-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('crates/blufio/benches/**') }}
          restore-keys: |
            bench-baseline-${{ hashFiles('Cargo.lock') }}-
            bench-baseline-

      # Cache ONNX model for hybrid pipeline benchmarks.
      - name: Cache ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/blufio/models
          key: onnx-model-all-MiniLM-L6-v2

      - name: Download ONNX model
        run: |
          MODEL_DIR="$HOME/.cache/blufio/models"
          mkdir -p "$MODEL_DIR"
          if [ ! -f "$MODEL_DIR/model.onnx" ]; then
            curl -L -o "$MODEL_DIR/model.onnx" \
              "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx"
          fi

      # Run benchmarks and save results.
      - name: Run benchmarks
        run: cargo bench -p blufio 2>&1 | tee bench-output.txt
        env:
          BLUFIO_MODEL_PATH: ~/.cache/blufio/models/model.onnx

      # Post benchmark results as PR comment via github-action-benchmark.
      - name: Store benchmark result
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Blufio Benchmarks
          tool: 'cargo'
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: '120%'
          fail-on-alert: ${{ github.event_name == 'push' }}
          auto-push: false

      # Check for >20% regressions in criterion output (main push only).
      # Criterion prints "regressed" for benchmarks that got slower.
      # We parse the output for regression percentages and fail if any exceed 20%.
      # Belt-and-suspenders: github-action-benchmark also alerts at 120%.
      - name: Check for regressions
        if: github.event_name == 'push'
        run: |
          echo "=== Checking for performance regressions ==="

          # Extract regression lines from criterion output.
          REGRESSIONS=$(grep -i "regressed" bench-output.txt || true)

          if [ -z "$REGRESSIONS" ]; then
            echo "No regressions detected."
            exit 0
          fi

          echo "Detected regression markers:"
          echo "$REGRESSIONS"

          # Parse percentage changes from criterion output.
          # Look for change lines with positive percentages > 20%.
          SEVERE=$(grep -oP 'change:.*?\+(\d+\.?\d*)%' bench-output.txt | \
            awk -F'+' '{print $2}' | awk -F'%' '{if ($1 > 20.0) print $1}' || true)

          if [ -n "$SEVERE" ]; then
            echo ""
            echo "FATAL: Benchmark regression >20% detected:"
            echo "$SEVERE"
            echo ""
            echo "Review the benchmark results above for details."
            exit 1
          fi

          echo "Regressions detected but all within 20% tolerance."

      # Upload HTML reports as artifact for manual investigation.
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion/
          retention-days: 30
